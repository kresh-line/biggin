<!doctype html>
<html lang="sq">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>iPad Praktik</title>
  <link rel="stylesheet" href="ipad_pratic.css">
</head>

<body>
  <main class="wrap">
    <header>
      <h1>iPad Praktik</h1>
      <p>Shiko versionin e ndarë CSS/JS — minimal dhe i qartë.</p>
    </header>

    <div class="controls">
      <button id="toggleTheme">Tema: E ndritshme</button>
      <button id="showInfo">Trego mesazhin</button>
      <label class="label-inline">
        <input id="rotate" type="checkbox">
        Simulo rotacion
      </label>
    </div>

    <div class="preview" id="preview">
      <div class="device portrait" id="device">
        <div class="status">Preview</div>
        <div class="content" id="message">Përshëndetje! Ky është një shembull i thjeshtë.</div>
      </div>
    </div>

    <footer>
      <small>Skedar i ndarë: HTML, CSS, JS</small>
    </footer>
  </main>

  <script src="ipad_pratic.js" defer></script>
</body>

</html>
