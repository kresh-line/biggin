    <body>
        
        <form action="" method="post">
            <fieldset>
                <legend>Στοιχεία</legend>
                
            <label for="prod">Προϊόν: </label> 
            <input type="text" name="prod" id="prod" autofocus required><br>
            <label for="price">Τιμή: </label> 
            <input type="number" name="price" id="price" min="0.0" step="0.01" value="5.0" required><br>
            <label for="pd">Ημ/νία Παραγωγής: </label> 
            <input type="date" name="pd" id="pd" value="2026-01-10" required><br>
            
            <label>Μονάδα: </label> 
            <input type="radio" name="unit" id="unit1" value="1" checked>
            <label for="unit1">Τεμάχια </label> 
            <input type="radio" name="unit" id="unit2" value="2">
            <label for="unit2">Κιλά </label> <br>
            
            <label for="dest">Προορισμός: </label>
            <select name="dest" id="dest">
                <option value="1">Χανιά</option>
                <option value="2">Ρέθυμνο</option>
                <option value="3" selected>Ηράκλειο</option>
                <option value="4">Λασίθι</option>
            </select><br>
            
            <button type="submit">Αποστολή</button>
            <button type="reset">Καθαρισμός</button> 
            </fieldset>
        </form>   
        
        
        <table class="pinstyle1">

            <tr><td>4</td><td>Όνομα 5</td><td>Χρόνος</td></tr>
        </table>
