<!doctype html>
<html lang="sq">
<head>
<meta charset="utf-8" />
<title>iPad Pratic — 14.5"</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="title">iPad Pratic</div>
    <div class="meta">
      <b>14.5"</b> display &nbsp;·&nbsp; <b>5.1mm</b> thin &nbsp;·&nbsp; 360° screen / 180° arm
    </div>
  </header>

  <main class="stage" id="stage">
    <div class="rig" id="rig">

      <!-- Magic Keyboard — 3D box, always flat on the table -->
      <div class="kb-box">
        <div class="kb-face kb-bottom"></div>
        <div class="kb-face kb-side n"></div>
        <div class="kb-face kb-side s"></div>
        <div class="kb-face kb-side w" style="width: 10px;"></div>
        <div class="kb-face kb-side e" style="width: 10px;"></div>
        <div class="kb-face keyboard">
          <div class="kb-row r1">
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span>
          </div>
          <div class="kb-row r2">
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span>
          </div>
          <div class="kb-row r3">
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span>
          </div>
          <div class="kb-row r4">
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
          </div>
          <div class="kb-row r5">
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span><span class="kb-key"></span>
            <span class="kb-key"></span><span class="kb-key"></span>
          </div>
          <div class="trackpad"></div>
        </div>
      </div>

      <!-- Counterbalance arms (left + right) -->
      <div class="arm l" id="arm-l"></div>
      <div class="arm r" id="arm-r"></div>

      <!-- Pivot anchor — iPad orbits around this point -->
      <div class="pivot-anchor" id="pivot-anchor">
        <div class="ipad" id="ipad">
          <div class="face front">
            <div class="notch"></div>
            <div class="screen"></div>
          </div>
          <div class="face back">
            <!-- Apple logo SVG -->
            <svg class="apple-logo" viewBox="0 0 170 204" xmlns="http://www.w3.org/2000/svg">
              <path d="M150.37 158.6c-2.76 6.37-6.02 12.23-9.79 17.61-5.14 7.34-9.35 12.42-12.6 15.24-5.04 4.63-10.43 7-16.21 7.13-4.15 0-9.15-1.18-14.97-3.57-5.84-2.38-11.21-3.56-16.12-3.56-5.15 0-10.67 1.18-16.58 3.56-5.92 2.39-10.69 3.63-14.34 3.76-5.54.24-11.06-2.2-16.57-7.32-3.52-3.07-7.92-8.33-13.18-15.78-5.65-7.96-10.29-17.18-13.93-27.69-3.9-11.36-5.85-22.36-5.85-33.01 0-12.2 2.64-22.72 7.91-31.54 4.14-7.09 9.65-12.68 16.55-16.78 6.9-4.1 14.36-6.19 22.39-6.32 4.41 0 10.19 1.36 17.37 4.04 7.16 2.69 11.76 4.05 13.78 4.05 1.51 0 6.62-1.59 15.27-4.77 8.18-2.95 15.08-4.17 20.74-3.69 15.34 1.24 26.86 7.29 34.52 18.18-13.71 8.31-20.49 19.95-20.36 34.88.12 11.63 4.34 21.31 12.63 29 3.76 3.56 7.95 6.32 12.62 8.27-1.01 2.94-2.08 5.75-3.23 8.45zM119.31 4.06c0 9.1-3.32 17.6-9.94 25.46-7.99 9.34-17.66 14.74-28.14 13.89-.13-1.09-.21-2.24-.21-3.45 0-8.74 3.81-18.07 10.57-25.71 3.37-3.87 7.66-7.09 12.86-9.66 5.19-2.53 10.1-3.93 14.72-4.17.13 1.22.21 2.44.21 3.65z"/>
            </svg>
          </div>
          <div class="face top"></div>
          <div class="face bottom"></div>
          <div class="face left-face"></div>
          <div class="face right-face"></div>
          <div class="pivot l"></div>
          <div class="pivot r"></div>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <div class="slider-wrap">
      <label for="screen-angle">Screen</label>
      <input type="range" id="screen-angle" min="-180" max="180" value="0" />
      <output id="screen-val">0°</output>
    </div>
    <div class="slider-wrap">
      <label for="arm-angle">Arm</label>
      <input type="range" id="arm-angle" min="0" max="180" value="90" />
      <output id="arm-val">90°</output>
    </div>
    <button class="ctrl" id="btn-spin" aria-pressed="false">Auto-rotate</button>
    <button class="ctrl" id="btn-front">Front</button>
    <button class="ctrl" id="btn-iso">3/4 view</button>
    <button class="ctrl" id="btn-side">Side</button>
  </footer>

<script src="script.js"></script>
</body>
</html>
